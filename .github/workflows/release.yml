name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Release build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build binaries
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/bin
          suffix=""
          if [ "${GOOS}" = "windows" ]; then
            suffix=".exe"
          fi

          go build -trimpath -o "dist/bin/binboi${suffix}" ./cmd/binboi
          go build -trimpath -o "dist/bin/binboid${suffix}" ./cmd/binboid

      - name: Package binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          archive="binboi-go_${GOOS}_${GOARCH}.${ARCHIVE_EXT}"
          mkdir -p dist/artifacts
          if [ "${ARCHIVE_EXT}" = "zip" ]; then
            cd dist/bin
            zip -q "../artifacts/${archive}" ./*
          else
            tar -C dist/bin -czf "dist/artifacts/${archive}" .
          fi
          echo "ARCHIVE_NAME=${archive}" >> "${GITHUB_ENV}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: dist/artifacts/${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(dist/release/*/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found."
            exit 1
          fi

          gh release create "${GITHUB_REF_NAME}" \
            "${files[@]}" \
            --generate-notes
